      #     - ./config/ssl/${SSL_CERTIFICATE_KEY}:/etc/nginx/ssl/${SSL_CERTIFICATE_KEY}:ro
      #   environment:
      #     - CONFLUENCE_DOMAIN=${CONFLUENCE_DOMAIN}
      #   depends_on:
      #     - confluence
      #   restart: always
      #   networks:
      #     - confluence_net
networks:
