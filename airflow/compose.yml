services:
  postgresql:
    image: 'docker.io/bitnami/postgresql:10-debian-10'
    volumes:
      - ./data/postgresql:/bitnami/postgresql
    environment:
      - POSTGRESQL_DATABASE=bitnami_airflow
      - POSTGRESQL_USERNAME=bn_airflow
      - POSTGRESQL_PASSWORD=bitnami1
      - ALLOW_EMPTY_PASSWORD=yes
    networks:
      - airflow
  redis:
    image: docker.io/bitnami/redis:6.0-debian-10
    volumes:
      - ./data/redis:/bitnami
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
    networks:
      - airflow
  airflow-scheduler:
    image: docker.io/bitnami/airflow-scheduler:1-debian-10
    environment:
      - AIRFLOW_DATABASE_NAME=bitnami_airflow
      - AIRFLOW_DATABASE_USERNAME=bn_airflow
      - AIRFLOW_DATABASE_PASSWORD=bitnami1
      - AIRFLOW_EXECUTOR=CeleryExecutor
    volumes:
      - ./data/airflow-scheduler:/bitnami
    networks:
      - airflow
  airflow-worker:
    image: docker.io/bitnami/airflow-worker:1-debian-10
    environment:
      - AIRFLOW_DATABASE_NAME=bitnami_airflow
      - AIRFLOW_DATABASE_USERNAME=bn_airflow
      - AIRFLOW_DATABASE_PASSWORD=bitnami1
      - AIRFLOW_EXECUTOR=CeleryExecutor
    volumes:
      - ./data/airflow-worker:/bitnami
    networks:
      - airflow
  airflow:
    image: docker.io/bitnami/airflow:1-debian-10
    environment:
      - AIRFLOW_DATABASE_NAME=bitnami_airflow
      - AIRFLOW_DATABASE_USERNAME=bn_airflow
      - AIRFLOW_DATABASE_PASSWORD=bitnami1
      - AIRFLOW_EXECUTOR=CeleryExecutor
    ports:
      - '8080:8080'
    volumes:
      - ./data/airflow:/bitnami
    networks:
      - airflow
networks:
  airflow:
    name: airflow
