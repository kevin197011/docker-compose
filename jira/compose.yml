services:
  jira:
    image: haxqer/jira:10.7.3
    container_name: jira
    environment:
      - TZ=${TZ}
      - JVM_MINIMUM_MEMORY=4g
      - JVM_MAXIMUM_MEMORY=4g
      - JVM_CODE_CACHE_ARGS='-XX:InitialCodeCacheSize=1g -XX:ReservedCodeCacheSize=4g'
      - ATL_DB_TYPE=postgres72
      - ATL_DB_DRIVER=org.postgresql.Driver
      - ATL_JDBC_URL=jdbc:postgresql://pgsql:5432/${POSTGRES_DB}
      - ATL_JDBC_USER=${POSTGRES_USER}
      - ATL_JDBC_PASSWORD=${POSTGRES_PASSWORD}
    depends_on:
      - pgsql
    ports:
      - "8080:8080"
    volumes:
      - ./data/jira:/var/jira
      - ./config/server.xml:/opt/jira/conf/server.xml
    restart: always
    networks:
      - jira_net
  pgsql:
    image: postgres:15
    container_name: pgsql
    environment:
      - TZ=${TZ}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - ./data/pgsql:/var/lib/postgresql/data
    restart: always
    networks:
      - jira_net
      # nginx:
      #   image: nginx:1.25
